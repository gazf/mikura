name: client-quality

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client-quality.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client-quality.yml"

defaults:
  run:
    working-directory: client

jobs:
  build:
    name: dotnet build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      # WinFsp.Interop / Mikura.App は WinFsp ネイティブ DLL に依存しており Linux
      # runner ではビルド不可。cross-platform な Core / Transport とそのテスト
      # プロジェクトのみを CI で検証する (net10.0-windows TFM でも
      # EnableWindowsTargeting=true により Linux でビルド可能)。
      - run: dotnet build src/Mikura.Core/Mikura.Core.csproj --configuration Debug
      - run: dotnet build src/Mikura.Transport/Mikura.Transport.csproj --configuration Debug
      - run: dotnet build tests/Mikura.Core.Tests/Mikura.Core.Tests.csproj --configuration Debug
      - run: dotnet build tests/Mikura.Transport.Tests/Mikura.Transport.Tests.csproj --configuration Debug

  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test tests/Mikura.Core.Tests/Mikura.Core.Tests.csproj --configuration Debug
      - run: dotnet test tests/Mikura.Transport.Tests/Mikura.Transport.Tests.csproj --configuration Debug
